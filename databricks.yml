bundle:
  name: novalake

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog catalog all Bronze/Silver/Gold objects live in.
    default: novalake
  warehouse_id:
    description: SQL warehouse used by the dbt_task.
    lookup:
      warehouse: "Serverless Starter Warehouse"

targets:
  dev:
    default: true
    # `mode: development` intentionally not set: its auto "[dev <user>] "
    # name prefix can't be turned off via `presets.name_prefix: ""` (CLI
    # v1.7.0 treats empty string as unset and re-derives the prefix anyway,
    # a Go zero-value quirk) — found 2026-07-22 wiring the dashboard, where
    # it forced a delete+recreate (Lakeview dashboards can't rename in
    # place) and was silently double-prefixing the job's name on top of its
    # own "[${bundle.target}]" convention. The two dev-mode presets that
    # actually matter for future resources are kept explicitly below.
    presets:
      trigger_pause_status: PAUSED
      pipelines_development: true
    workspace:
      host: https://dbc-0fadb959-36a9.cloud.databricks.com
      # `profile:` deliberately not pinned here (was `profile: DEFAULT`
      # until v0.5) — this target is now deployed by two different
      # identities: Chirag locally (personal OAuth) and GitHub Actions
      # (novalake-cicd service principal, env-var auth — see
      # docs/adr/0006). A hardcoded profile would make CI look for a
      # `DEFAULT` profile that doesn't exist in the runner instead of
      # falling back to its env vars. Run locally with `-p DEFAULT` (or
      # set `DATABRICKS_CONFIG_PROFILE=DEFAULT` once) instead of relying on
      # this file to supply it.
      # `root_path` IS pinned, explicitly, to Chirag's own folder — found
      # 2026-07-22 via the first real CI run of bundle-validate: without
      # this, root_path defaults to *whichever identity is deploying*'s own
      # home folder, so CI (authenticated as novalake-cicd) resolved to
      # /Workspace/Users/<application-id>/... instead of Chirag's folder.
      # bundle-deploy would have created a brand-new, parallel job/dashboard
      # under the service principal's own home instead of adopting the
      # existing ones — novalake-cicd's CAN_MANAGE grant (docs/checkpoint.md,
      # 2026-07-22) is specifically on Chirag's folder, so both identities
      # must resolve to the same path for that grant to mean anything.
      root_path: /Workspace/Users/chiragvenkatesh92@gmail.com/.bundle/${bundle.name}/${bundle.target}
  # No `prod` target: this is one Free Edition workspace, and a same-
  # workspace "prod" would only be a semantic overlay, not real environment
  # isolation. Real prod/reproducibility is deferred to a future exercise
  # reproducing this bundle in a genuinely separate workspace via IaC — see
  # docs/adr/0007. `v0.5`'s CI/CD targets `dev` for real, taking over the
  # resources already deployed there (see docs/checkpoint.md, 2026-07-22).
