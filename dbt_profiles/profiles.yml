novalake:
  target: dev
  outputs:
    dev:
      type: databricks
      catalog: novalake
      schema: silver
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      # No static token: OAuth U2M, sharing the same token cache the
      # `databricks` CLI itself uses (~/.databricks/token-cache.json) — should
      # reuse the existing CLI session rather than opening a new browser flow.
      auth_type: oauth
      threads: 4
      # prod output added at v0.5 (CI/CD), alongside the service-principal deploy
      # it actually requires — not pre-scaffolded here.
