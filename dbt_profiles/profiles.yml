novalake:
  target: dev
  outputs:
    dev:
      type: databricks
      catalog: novalake
      schema: silver
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      threads: 4
      # prod output added at v0.5 (CI/CD), alongside the service-principal deploy
      # it actually requires — not pre-scaffolded here.
