name: 'novalake'
version: '1.0.0'
config-version: 2

profile: 'novalake'
require-dbt-version: [">=1.8.0", "<2.0.0"]

model-paths: ["models"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  novalake:
    staging:
      # dbt's "staging" convention and the project's "Silver" medallion layer are
      # treated as the same thing here, on purpose — not a naming oversight.
      +schema: silver
      +materialized: view
    intermediate:
      # Real Silver transform work (dedupe, drift-fix, explode, DLQ split) —
      # still Silver's UC schema, just not the thin 1:1 "staging" convention.
      +schema: silver
      +materialized: view
    gold:
      # Conformed dims/facts on top of Silver. +schema: gold maps 1:1 to
      # Unity Catalog's novalake.gold via the same generate_schema_name
      # override as staging/intermediate (ADR-0005).
      +schema: gold
      +materialized: view
      metrics:
        # Pre-aggregated business-metric rollups — a different kind of model
        # than atomic dims/facts, worth its own declared block even though it
        # resolves to the same schema (same reasoning as staging/intermediate
        # being declared separately).
        +schema: gold
        +materialized: view
