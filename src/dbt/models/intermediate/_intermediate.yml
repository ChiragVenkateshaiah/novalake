  - name: int_multiline_support_ticket_messages
    description: >
      int_multiline_support_tickets_clean.messages exploded (plain --
      guaranteed non-empty). reactions treated as direct struct access
      (closed-enum, only ever the "agent" key), not MAP reconstruction.
    columns:
      - name: event_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_multiline_support_tickets_clean')
                field: event_id
      - name: sender
        tests:
          - not_null
      - name: body_text
        tests:
          - not_null

  - name: int_multiline_support_ticket_attachments
    description: >
      int_multiline_support_ticket_messages.attachments exploded (OUTER --
      can be empty).
    columns:
      - name: event_id
        tests:
          - not_null
