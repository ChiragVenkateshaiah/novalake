version: 2

models:
  - name: int_events_deduped
    description: >
      All event types, deduped by event_id (max ingested_at wins). Envelope-
      level drift resolved (timestamp, source). Payload untouched -- this is
      the generic base future v0.2 slices (the other 7 event types) reuse.
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: event_type
        tests:
          - not_null
      - name: event_timestamp_quality
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["ok", "null", "epoch_zero", "far_future"]

  - name: int_transactions
    description: >
      transaction.{completed,failed,created} only. Payload drift resolved;
      line_items still an array (exploded downstream, post-DLQ-split).
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: event_type
        tests:
          - accepted_values:
              arguments:
                values: ["transaction.completed", "transaction.failed", "transaction.created"]
      - name: customer_id_resolved
        description: >
          coalesce(customer_id, cust_id) -- always populated by generator
          construction, exactly one of the two source fields is set per row.
        tests:
          - not_null
      - name: amount_minor_resolved
        tests:
          - not_null
      - name: risk_score
        description: >
          Always recoverable -- from_json for the well-formed 97%, regex
          fallback for the malformed 3% (see int_transactions.sql).
        tests:
          - not_null
      - name: currency_clean
        tests:
          - accepted_values:
              config:
                severity: warn   # "US$" is a known, intentional invalid value
                                  # -- surface it, don't fail the job on it
              arguments:
                values: ["USD", "EUR", "GBP", "INR", "JPY", "CAD", "AUD"]

  - name: int_transactions_clean
    description: >
      int_transactions filtered to event_timestamp_quality = 'ok'.
    columns:
      - name: resolved_event_timestamp
        description: >
          not_null here catches a real bug class: a row classified 'ok' by
          int_events_deduped's quality-flag logic that somehow carries a null
          resolved timestamp. (An accepted_values test on
          event_timestamp_quality itself would be tautological -- it would
          just re-test this model's own WHERE clause against itself.)
        tests:
          - not_null

  - name: int_transactions_dlq
    description: >
      int_transactions filtered to event_timestamp_quality != 'ok' -- the
      quarantine table. Complementary to int_transactions_clean; kept at
      transaction grain (unexploded) for easy review.

  - name: int_transaction_line_items
    description: >
      int_transactions_clean.line_items exploded (LATERAL VIEW OUTER
      posexplode). DLQ rows are never exploded.
    columns:
      - name: event_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_transactions_clean')
                field: event_id

  # --- Increment 1: auth.session, review.submitted, refund.issued ---

  - name: int_auth_sessions
    description: >
      auth.session only. customer_id_resolved from the generic layer;
      device struct-vs-flat-fields reshaping resolved here (specific to this
      type).
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: event_type
        tests:
          - accepted_values:
              arguments:
                values: ["auth.session"]
      - name: customer_id_resolved
        tests:
          - not_null
      - name: device_os_resolved
        description: >
          coalesce(device.os, device_os) -- always populated by generator
          construction regardless of schema_version.
        tests:
          - not_null
      - name: device_id_resolved
        tests:
          - not_null

  - name: int_auth_sessions_clean
    columns:
      - name: resolved_event_timestamp
        tests:
          - not_null

  - name: int_auth_sessions_dlq
    description: int_auth_sessions filtered to event_timestamp_quality != 'ok'.

  - name: int_reviews
    description: >
      review.submitted only. No payload drift beyond customer_id_resolved --
      every other field is stable across v1/v2.
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: event_type
        tests:
          - accepted_values:
              arguments:
                values: ["review.submitted"]
      - name: customer_id_resolved
        tests:
          - not_null
      - name: merchant_id
        tests:
          - not_null
      - name: rating
        tests:
          - not_null

  - name: int_reviews_clean
    columns:
      - name: resolved_event_timestamp
        tests:
          - not_null

  - name: int_reviews_dlq
    description: int_reviews filtered to event_timestamp_quality != 'ok'.

  - name: int_refunds
    description: >
      refund.issued only. currency_clean via the shared clean_currency macro.
      amount and notes are genuinely nullable by generator design (maybe(...))
      -- not tested not_null on purpose.
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: event_type
        tests:
          - accepted_values:
              arguments:
                values: ["refund.issued"]
      - name: customer_id_resolved
        tests:
          - not_null
      - name: original_transaction_id
        tests:
          - not_null
      - name: reason
        tests:
          - not_null
      - name: currency_clean
        tests:
          - accepted_values:
              config:
                severity: warn   # "US$" is a known, intentional invalid value
              arguments:
                values: ["USD", "EUR", "GBP", "INR", "JPY", "CAD", "AUD"]

  - name: int_refunds_clean
    columns:
      - name: resolved_event_timestamp
        tests:
          - not_null

  - name: int_refunds_dlq
    description: int_refunds filtered to event_timestamp_quality != 'ok'.

  # --- Increment 2: kyc.verification, payout.scheduled, risk.alert ---

  - name: int_kyc_verifications
    description: >
      kyc.verification only. No payload drift beyond customer_id_resolved.
      documents[] stays an array here, exploded downstream.
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: event_type
        tests:
          - accepted_values:
              arguments:
                values: ["kyc.verification"]
      - name: customer_id_resolved
        tests:
          - not_null
      - name: full_name
        tests:
          - not_null
      - name: risk_score
        tests:
          - not_null

  - name: int_kyc_verifications_clean
    columns:
      - name: resolved_event_timestamp
        tests:
          - not_null

  - name: int_kyc_verifications_dlq
    description: int_kyc_verifications filtered to event_timestamp_quality != 'ok'.

  - name: int_kyc_documents
    description: >
      int_kyc_verifications_clean.documents exploded (plain posexplode --
      documents[] is guaranteed non-empty by construction).
    columns:
      - name: event_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_kyc_verifications_clean')
                field: event_id

  - name: int_payouts
    description: >
      payout.scheduled only. No customer_id_resolved column -- this type is
      merchant-centric, has no customer key at all. currency_clean via the
      shared clean_currency macro. fees[] stays an array here, exploded
      downstream.
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: event_type
        tests:
          - accepted_values:
              arguments:
                values: ["payout.scheduled"]
      - name: merchant_id
        tests:
          - not_null
      - name: gross_amount
        tests:
          - not_null
      - name: currency_clean
        tests:
          - accepted_values:
              config:
                severity: warn   # "US$" is a known, intentional invalid value
              arguments:
                values: ["USD", "EUR", "GBP", "INR", "JPY", "CAD", "AUD"]

  - name: int_payouts_clean
    columns:
      - name: resolved_event_timestamp
        tests:
          - not_null

  - name: int_payouts_dlq
    description: int_payouts filtered to event_timestamp_quality != 'ok'.

  - name: int_payout_fees
    description: >
      int_payouts_clean.fees exploded (LATERAL VIEW OUTER posexplode -- fees
      can legitimately be empty, so OUTER preserves zero-fee payouts).
    columns:
      - name: event_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_payouts_clean')
                field: event_id

  - name: int_risk_alerts
    description: >
      risk.alert only. No payload drift beyond customer_id_resolved.
      signals[] stays an array here, exploded downstream.
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: event_type
        tests:
          - accepted_values:
              arguments:
                values: ["risk.alert"]
      - name: customer_id_resolved
        tests:
          - not_null
      - name: alert_type
        tests:
          - not_null
      - name: severity
        tests:
          - not_null

  - name: int_risk_alerts_clean
    columns:
      - name: resolved_event_timestamp
        tests:
          - not_null

  - name: int_risk_alerts_dlq
    description: int_risk_alerts filtered to event_timestamp_quality != 'ok'.

  - name: int_risk_alert_signals
    description: >
      int_risk_alerts_clean.signals exploded (plain posexplode -- signals[]
      is guaranteed non-empty by construction).
    columns:
      - name: event_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_risk_alerts_clean')
                field: event_id

  # --- Increment 3: support.ticket ---

  - name: int_support_tickets
    description: >
      support.ticket only. No payload drift beyond customer_id_resolved.
      description is free text, kept as-is for the eventual GenAI layer.
      tags[] and messages[] both stay arrays here, exploded downstream as
      two independent siblings. related_transaction_id and
      resolution_minutes are genuinely nullable by generator design --
      not tested not_null on purpose.
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: event_type
        tests:
          - accepted_values:
              arguments:
                values: ["support.ticket"]
      - name: customer_id_resolved
        tests:
          - not_null
      - name: ticket_id
        tests:
          - not_null
      - name: subject
        tests:
          - not_null
      - name: description
        tests:
          - not_null

  - name: int_support_tickets_clean
    columns:
      - name: resolved_event_timestamp
        tests:
          - not_null

  - name: int_support_tickets_dlq
    description: int_support_tickets filtered to event_timestamp_quality != 'ok'.

  - name: int_support_ticket_tags
    description: >
      int_support_tickets_clean.tags exploded (LATERAL VIEW OUTER explode --
      tags[] can legitimately be empty, so OUTER preserves zero-tag tickets).
    columns:
