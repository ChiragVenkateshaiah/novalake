version: 2

sources:
  - name: bronze
    # No hardcoded `database:` — defaults to target.database, which already
    # tracks the same `catalog` bundle variable src/ingest.py and the DAB
    # dbt_task both use. Hardcoding it here would silently decouple this
    # source from that variable if it's ever overridden.
    schema: bronze
    tables:
      - name: raw_events
        description: >
          Raw polymorphic event envelope landed as-is by src/ingest.py from
          payments_events.json. No transformation applied at this layer.
      - name: raw_events_multiline
        description: >
          Raw paginated export landed as-is by src/ingest_multiline.py from
          payments_events_multiline.json (multiLine=true read -- one row per
          page, 9 rows). No transformation applied at this layer, including
          the dynamic-key-map fields (metadata, balances, tax_ids, consents,
          checksums, currency_catalog) -- confirmed via a real `describe`
          that every one of them lands as a bounded, named-field struct
          (Spark's inference is safe here since every dynamic-key map in
          this generator draws from a fixed key universe), not an unbounded
          explosion.
